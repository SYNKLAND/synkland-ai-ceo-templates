# SYNKLAND Kill Cron - daily 14-day check for V2-F (and future ventures)
# Runs daily at 00:00 UTC (09:00 JST)
name: synkland-kill-cron
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  kill-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger V2-F kill judgement
        env:
          ADMIN_TOKEN: ${{ secrets.SYNKLAND_ADMIN_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ADMIN_TOKEN not set, skipping"
            exit 0
          fi
          RESP=$(curl -s "https://synkland.pages.dev/api/v2_kill_cron?token=$ADMIN_TOKEN")
          echo "$RESP"
          # Fail the action if the endpoint returns kill_proposed (so SYNK gets notification)
          echo "$RESP" | grep -q '"judgement":"KILL_PROPOSED"' && {
            echo "::warning::V2-F kill proposed — SYNK 三審制 必要"
            exit 1
          } || true
